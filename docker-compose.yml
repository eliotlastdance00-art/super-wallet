services:
  
  notification_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.notifications.worker
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: superwallet
      POSTGRES_PASSWORD: superwallet
      POSTGRES_DB: superwallet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload  
    volumes:
      - .:/app

volumes:
  pgdata:


  